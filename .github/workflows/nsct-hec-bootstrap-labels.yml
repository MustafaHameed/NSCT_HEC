name: NSCT HEC Bootstrap Labels

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/nsct-hec-bootstrap-labels.yml'

permissions:
  issues: write

jobs:
  ensure-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update NSCT_HEC labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'intake:new', color: '0e8a16', description: 'New student intake request' },
              { name: 'intake:correction', color: 'fbca04', description: 'Existing student correction request' },
              { name: 'status:new', color: 'ededed', description: 'Newly submitted and not processed yet' },
              { name: 'status:validated', color: '0e8a16', description: 'Validation passed by workflow' },
              { name: 'status:needs-info', color: 'd93f0b', description: 'Submission needs more information' },
              { name: 'status:awaiting-advisor', color: '5319e7', description: 'Waiting for advisor /approve-correction' },
              { name: 'advisor-approved', color: '0052cc', description: 'Advisor approved correction command' },
              { name: 'nsct-hec', color: '0052cc', description: 'NSCT_HEC workflow generated item' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });

                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description
                });
                core.info(`Updated label: ${label.name}`);
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  core.info(`Created label: ${label.name}`);
                } else {
                  throw error;
                }
              }
            }
