name: NSCT HEC Intake Validate

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate-and-prepare:
    if: contains(join(github.event.issue.labels.*.name, ','), 'intake:new') || contains(join(github.event.issue.labels.*.name, ','), 'intake:correction')
    runs-on: ubuntu-latest

    outputs:
      proceed_pr: ${{ steps.process.outputs.proceed_pr }}
      commit_message: ${{ steps.process.outputs.commit_message }}
      pr_title: ${{ steps.process.outputs.pr_title }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check repository privacy guidance
        run: |
          if [ "${{ github.event.repository.private }}" != "true" ]; then
            echo "::warning title=Repository privacy guidance::This repository is public. NSCT_HEC handles student data, so use a private repository and avoid exposing raw CNIC in issues, comments, PRs, or files."
            echo "## Privacy guidance" >> "$GITHUB_STEP_SUMMARY"
            echo "- Repository is currently public." >> "$GITHUB_STEP_SUMMARY"
            echo "- NSCT_HEC should run in a private repository." >> "$GITHUB_STEP_SUMMARY"
            echo "- Do not expose raw CNIC in issues, comments, PRs, or tracked files." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check CNIC_PEPPER secret
        env:
          CNIC_PEPPER: ${{ secrets.CNIC_PEPPER }}
        run: |
          if [ -z "$CNIC_PEPPER" ]; then
            echo "::error title=Missing repository secret::CNIC_PEPPER is not configured. Add it in Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi

      - name: Process intake issue
        id: process
        env:
          CNIC_PEPPER: ${{ secrets.CNIC_PEPPER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/intake_manager.py process-issue \
            --event "$GITHUB_EVENT_PATH" \
            --repo-root "."

      - name: Upload pending corrections artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nsct-hec-pending-corrections-${{ github.event.issue.number }}
          path: data/pending_corrections
          if-no-files-found: ignore

  create-pr:
    needs: validate-and-prepare
    if: needs.validate-and-prepare.outputs.proceed_pr == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: nsct-hec/intake-${{ github.event.issue.number }}-${{ github.run_id }}
          commit-message: ${{ needs.validate-and-prepare.outputs.commit_message }}
          title: ${{ needs.validate-and-prepare.outputs.pr_title }}
          body: |
            Automated intake update from issue #${{ github.event.issue.number }}.

            - Validation completed by workflow `${{ github.workflow }}`
            - Issue link: ${{ github.event.issue.html_url }}
          labels: |
            nsct-hec
            status:validated
          add-paths: |
            data/master/students.csv
            data/master/students.json
            data/pending_corrections/
